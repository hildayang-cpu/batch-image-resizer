<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 高級現代化甘特圖排程系統 Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --chart-bar: #818cf8;
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --chart-bar: #6366f1;
        }

        * { box-sizing: border-box; transition: background-color 0.2s, border-color 0.2s; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 24px; background-color: var(--bg-main); color: var(--text-main);
        }
        .app-container { max-width: 1400px; margin: 0 auto; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding: 16px 24px; background: var(--panel-bg);
            border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-color);
        }
        h1 { margin: 0; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 8px 16px; border-radius: 9999px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500;
        }
        .workspace { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 1024px) { .workspace { grid-template-columns: 480px 1fr; } }
        .card {
            background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); padding: 24px; display: flex; flex-direction: column;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            background-color: var(--primary); color: white; border: none; padding: 10px 16px;
            border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background-color: var(--bg-main); }
        .table-container { overflow-x: auto; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background-color: var(--bg-main); color: var(--text-muted); padding: 12px; font-weight: 600; text-align: left; }
        td { padding: 12px; border-top: 1px solid var(--border-color); background: var(--panel-bg); }
        input { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--panel-bg); color: var(--text-main); font-size: 13px; }
        .chart-wrapper { background: var(--panel-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; display: flex; justify-content: center; }
        canvas { background: var(--panel-bg); border-radius: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1><i class="fa-solid fa-chart-gantt" style="color: var(--primary);"></i> 智慧型現代化甘特圖排程系統 Pro</h1>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i> <span>切換護眼模式</span>
        </button>
    </header>

    <div class="workspace">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title"><i class="fa-solid fa-list-check"></i> 任務排程管理</h2>
                <button class="btn" onclick="addTaskRow()"><i class="fa-solid fa-plus"></i> 新增任務</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50%">任務名稱</th>
                            <th style="width: 35%">開始日期</th>
                            <th style="width: 15%">天數</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="taskItems">
                        <tr>
                            <td><input type="text" value="需求分析與規格確認" class="t-name"></td>
                            <td><input type="date" value="2026-07-01" class="t-start"></td>
                            <td><input type="number" value="5" min="1" class="t-days"></td>
                            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); drawGantt();"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>
                        <tr>
                            <td><input type="text" value="前端優雅介面開發" class="t-name"></td>
                            <td><input type="date" value="2026-07-06" class="t-start"></td>
                            <td><input type="number" value="7" min="1" class="t-days"></td>
                            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); drawGantt();"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="btn btn-success" style="width: 100%; font-size:15px; height:45px;" onclick="drawGantt()">
                <i class="fa-solid fa-rotate"></i> 立即更新時程圖表
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title"><i class="fa-solid fa-eye"></i> 即時甘特圖看板</h2>
                <button class="btn btn-outline" onclick="downloadCanvas()"><i class="fa-solid fa-image"></i> 下載圖片</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="ganttCanvas" width="700" height="400"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        const icon = document.querySelector('.theme-toggle i');
        const text = document.querySelector('.theme-toggle span');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fa-solid fa-moon';
            text.innerText = '切換護眼模式';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
            text.innerText = '切換明亮模式';
        }
        drawGantt();
    }

    function addTaskRow() {
        const tbody = document.getElementById('taskItems');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" value="新項目排程" class="t-name"></td>
            <td><input type="date" value="2026-07-01" class="t-start"></td>
            <td><input type="number" value="4" min="1" class="t-days"></td>
            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); drawGantt();"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(tr);
        drawGantt();
    }

    function drawGantt() {
        const canvas = document.getElementById('ganttCanvas');
        const ctx = canvas.getContext('2d');
        const names = document.querySelectorAll('.t-name');
        const starts = document.querySelectorAll('.t-start');
        const days = document.querySelectorAll('.t-days');

        // 清空畫布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 取得目前主題顏色
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const textStyle = isDark ? '#f8fafc' : '#1e293b';
        const gridStyle = isDark ? '#334155' : '#e2e8f0';
        const barColor = isDark ? '#6366f1' : '#4f46e5';

        // 基礎排版設定
        const leftPadding = 180;
        const topPadding = 50;
        const rowHeight = 40;
        
        // 自動調整畫布高度
        canvas.height = Math.max(250, names.length * rowHeight + topPadding + 40);

        // 找出日期區間
        let minDate = null, maxDate = null;
        const parsedTasks = [];

        for (let i = 0; i < names.length; i++) {
            if (!starts[i].value || !days[i].value) continue;
            const start = new Date(starts[i].value);
            const duration = parseInt(days[i].value);
            const end = new Date(start);
            end.setDate(start.getDate() + duration);

            if (!minDate || start < minDate) minDate = new Date(start);
            if (!maxDate || end > maxDate) maxDate = new Date(end);

            parsedTasks.push({ name: names[i].value, start, duration });
        }

        if (parsedTasks.length === 0) {
            ctx.fillStyle = textStyle;
            ctx.font = '14px sans-serif';
            ctx.fillText('請填寫任務資訊以生成圖表', 50, 50);
            return;
        }

        // 基礎日期調整（前後留白 2 天方便檢視）
        minDate.setDate(minDate.getDate() - 2);
        maxDate.setDate(maxDate.getDate() + 2);
        const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
        const colWidth = (canvas.width - leftPadding - 20) / totalDays;

        // 1. 畫縱向日曆格線與日期標題
        ctx.font = '12px sans-serif';
        for (let i = 0; i <= totalDays; i += Math.ceil(totalDays / 8)) {
            const current = new Date(minDate);
            current.setDate(minDate.getDate() + i);
            const x = leftPadding + i * colWidth;

            ctx.strokeStyle = gridStyle;
            ctx.beginPath();
            ctx.moveTo(x, topPadding - 15);
            ctx.lineTo(x, canvas.height - 20);
            ctx.stroke();

            ctx.fillStyle = isDark ? '#94a3b8' : '#64748b';
            const dateStr = (current.getMonth() + 1) + '/' + current.getDate();
            ctx.fillText(dateStr, x - 10, topPadding - 25);
        }

        // 2. 繪製任務列
        parsedTasks.forEach((task, index) => {
            const y = topPadding + index * rowHeight;

            // 繪製任務名稱
            ctx.fillStyle = textStyle;
            ctx.font = 'bold 13px sans-serif';
            ctx.fillText(task.name, 20, y + 18);

            // 計算時間條位置
            const daysFromStart = Math.ceil((task.start - minDate) / (1000 * 60 * 60 * 24));
            const barX = leftPadding + daysFromStart * colWidth;
            const barW = task.duration * colWidth;

            // 繪製美觀的圓角進度條
            ctx.fillStyle = barColor;
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(barX, y, barW, 24, 6);
            } else {
                ctx.rect(barX, y, barW, 24);
            }
            ctx.fill();

            // 標示天數文字
            ctx.fillStyle = '#ffffff';
            ctx.font = '11px sans-serif';
            ctx.fillText(task.duration + '天', barX + 8, y + 16);
        });
    }

    function downloadCanvas() {
        const canvas = document.getElementById('ganttCanvas');
        const link = document.createElement('a');
        link.download = '專案時程甘特圖.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    document.addEventListener("DOMContentLoaded", () => {
        drawGantt();
    });
</script>

</body>
</html>
