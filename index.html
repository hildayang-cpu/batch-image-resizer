<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 高級現代化甘特圖排程系統 Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.2s, border-color 0.2s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 1024px) {
            .workspace { grid-template-columns: 480px 1fr; }
        }

        .card {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background-color: var(--bg-main); }

        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background-color: var(--bg-main);
            color: var(--text-muted);
            padding: 12px;
            font-weight: 600;
            text-align: left;
        }

        td {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            background: var(--panel-bg);
        }

        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--panel-bg);
            color: var(--text-main);
            font-size: 13px;
        }

        .chart-section {
            min-height: 500px;
        }

        .chart-wrapper {
            background: white;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }

        [data-theme="dark"] .chart-wrapper { background: #1e293b; }

        .action-bar {
            margin-top: 20px;
        }

        .style-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1><i class="fa-solid fa-chart-gantt" style="color: var(--primary);"></i> 智慧型現代化甘特圖排程系統 Pro</h1>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i> <span>切換護眼模式</span>
        </button>
    </header>

    <div class="workspace">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title"><i class="fa-solid fa-list-check"></i> 任務排程與維護</h2>
                <button class="btn" onclick="addTableRow()">加 新增任務</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 35%">任務名稱</th>
                            <th style="width: 25%">主題/分類</th>
                            <th style="width: 25%">開始日期</th>
                            <th style="width: 15%">天數</th>
                            <th style="width: 10%"></th>
                        </tr>
                    </thead>
                    <tbody id="taskItems">
                        <tr>
                            <td><input type="text" value="需求分析與規格確認" class="t-name"></td>
                            <td>
                                <select class="t-section">
                                    <option value="規劃階段">規劃階段</option>
                                    <option value="開發階段">開發階段</option>
                                    <option value="測試與上線">測試與上線</option>
                                </select>
                            </td>
                            <td><input type="date" value="2026-07-01" class="t-start"></td>
                            <td><input type="number" value="4" min="1" class="t-days"></td>
                            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); refreshGantt();"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>
                        <tr>
                            <td><input type="text" value="前端優雅介面開發" class="t-name"></td>
                            <td>
                                <select class="t-section">
                                    <option value="規劃階段">規劃階段</option>
                                    <option value="開發階段" selected>開發階段</option>
                                    <option value="測試與上線">測試與上線</option>
                                </select>
                            </td>
                            <td><input type="date" value="2026-07-05" class="t-start"></td>
                            <td><input type="number" value="6" min="1" class="t-days"></td>
                            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); refreshGantt();"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="style-options">
                <div>
                    <label style="font-size: 13px; font-weight: 500; color: var(--text-muted);">🎨 圖表風格</label>
                    <select id="chartTheme" onchange="refreshGantt()" style="margin-top:6px;">
                        <option value="default">經典優雅</option>
                        <option value="forest">森林綠意</option>
                        <option value="neutral">商務沉穩</option>
                        <option value="base">簡約透亮</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 13px; font-weight: 500; color: var(--text-muted);">📅 日期格式</label>
                    <select id="axisFormat" onchange="refreshGantt()" style="margin-top:6px;">
                        <option value="%m/%d">月/日</option>
                        <option value="%Y-%m-%d">年-月-日</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-success" style="width: 100%; margin-top: 20px; font-size:15px; height:45px;" onclick="refreshGantt()">
                🔄 立即更新時程視覺化
            </button>
        </div>

        <div class="card chart-section">
            <div class="card-header">
                <h2 class="card-title"><i class="fa-solid fa-eye"></i> 即時視覺化時程看板</h2>
            </div>
            
            <div class="chart-wrapper" id="ganttCaptureBlock">
                <div id="mermaidGanttContainer" style="width:100%;"></div>
            </div>

            <div class="action-bar">
                <button class="btn" onclick="exportAsImage()"><i class="fa-solid fa-image"></i> 導出高畫質簡報圖片 (PNG)</button>
            </div>
        </div>
    </div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });

    function toggleTheme() {
        const body = document.documentElement;
        const currentTheme = body.getAttribute('data-theme');
        const icon = document.querySelector('.theme-toggle i');
        const text = document.querySelector('.theme-toggle span');
        
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fa-solid fa-moon';
            text.innerText = '切換護眼模式';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
            text.innerText = '切換明亮模式';
        }
        refreshGantt();
    }

    function addTableRow() {
        const tbody = document.getElementById('taskItems');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" value="新項目排程" class="t-name"></td>
            <td>
                <select class="t-section">
                    <option value="規劃階段">規劃階段</option>
                    <option value="開發階段">開發階段</option>
                    <option value="測試與上線">測試與上線</option>
                </select>
            </td>
            <td><input type="date" value="2026-07-01" class="t-start"></td>
            <td><input type="number" value="3" min="1" class="t-days"></td>
            <td><button class="btn-outline" style="color:var(--danger); padding:6px;" onclick="this.parentElement.parentElement.remove(); refreshGantt();"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(tr);
        refreshGantt();
    }

    function refreshGantt() {
        const names = document.querySelectorAll('.t-name');
        const sections = document.querySelectorAll('.t-section');
        const starts = document.querySelectorAll('.t-start');
        const days = document.querySelectorAll('.t-days');
        
        if (names.length === 0) {
            document.getElementById('mermaidGanttContainer').innerHTML = '<div>目前尚無任何任務！</div>';
            return;
        }

        const selectedTheme = document.getElementById('chartTheme').value;
        const selectedAxis = document.getElementById('axisFormat').value;

        let script = 'gantt\n';
        script += 'dateFormat YYYY-MM-DD\n';
        script += 'axisFormat ' + selectedAxis + '\n';
        
        const groups = {};
        for (let i = 0; i < names.length; i++) {
            const sec = sections[i].value;
            if (!groups[sec]) groups[sec] = [];
            groups[sec].push({
                name: names[i].value.replace(/:/g, '-'),
                start: starts[i].value,
                day: days[i].value
            });
        }

        for (const [secName, tasks] of Object.entries(groups)) {
            script += 'section ' + secName + '\n';
            tasks.forEach(t => {
                if (t.start && t.day) {
                    script += t.name + ' : active, ' + t.start + ', ' + t.day + 'd\n';
                }
            });
        }

        const container = document.getElementById('mermaidGanttContainer');
        container.innerHTML = '<pre class="mermaid">' + script + '</pre>';
        
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        mermaid.initialize({
            startOnLoad: false,
            theme: isDark ? 'dark' : selectedTheme
        });
        
        mermaid.run();
    }

    function exportAsImage() {
        const element = document.getElementById('ganttCaptureBlock');
        html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = '甘特圖專案報表.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    document.addEventListener("DOMContentLoaded", function() {
        refreshGantt();
    });
</script>

</body>
</html>
